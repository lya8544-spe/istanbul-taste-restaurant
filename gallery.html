<style>
/* ===========================
   Genel Ayarlar
=========================== */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #8B0000;
    color: white;
    padding: 15px 20px;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

nav h2 {
    margin: 0;
    font-size: 24px;
}

nav ul {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
    flex-wrap: wrap;
}

nav ul li {
    margin: 0 15px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s;
}

nav ul li a:hover {
    color: #FFD700;
}

/* ===========================
   Galeri Alanı
=========================== */
.container {
    padding: 50px 20px;
    text-align: center;
}

h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

.container p {
    font-size: 18px;
    margin-bottom: 30px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.gallery img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
}

/* ===========================
   Footer
=========================== */
footer {
    background: #1a1a1a;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 50px;
}

/* ===========================
   WhatsApp Butonu
=========================== */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    transition: transform 0.3s, box-shadow 0.3s;
}

.whatsapp:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 12px rgba(0,0,0,0.4);
}

/* ===========================
   Mobil Uyumluluk
=========================== */
@media (max-width: 768px) {
    nav ul {
        flex-direction: column;
        gap: 10px;
        margin-top: 10px;
    }

    nav h2 {
        font-size: 22px;
        margin-bottom: 10px;
    }

    h1 {
        font-size: 28px;
    }

    .container p {
        font-size: 16px;
    }

    .gallery {
        gap: 15px;
    }
}

@media (max-width: 480px) {
    h1 {
        font-size: 24px;
    }

    .container p {
        font-size: 14px;
    }

    .gallery img {
        height: 150px;
    }
}
</style>
</head>
