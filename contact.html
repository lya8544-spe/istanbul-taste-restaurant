<link rel="stylesheet" href="css/style.css">
<style>
/* ===========================
   Genel Ayarlar
=========================== */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #8B0000;
    color: white;
    padding: 15px 20px;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

nav h2 {
    margin: 0;
    font-size: 24px;
}

nav ul {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
    flex-wrap: wrap;
}

nav ul li {
    margin: 0 15px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s;
}

nav ul li a:hover {
    color: #FFD700;
}

/* ===========================
   İçerik Alanı
=========================== */
.container {
    max-width: 900px;
    margin: auto;
    padding: 50px 20px;
    text-align: center;
}

h1 {
    font-size: 36px;
    margin-bottom: 20px;
}

.info {
    margin-top: 30px;
    line-height: 1.8;
    font-size: 16px;
}

.social {
    margin-top: 30px;
}

.social h3 {
    font-size: 22px;
    margin-bottom: 10px;
}

.social a {
    margin: 0 10px;
    font-size: 18px;
    text-decoration: none;
    color: #8B0000;
    transition: color 0.3s;
}

.social a:hover {
    color: #D4AF37;
}

.map {
    margin-top: 30px;
    border-radius: 10px;
    overflow: hidden;
}

/* ===========================
   Footer
=========================== */
footer {
    background: #1a1a1a;
    color: white;
    text-align: center;
    padding: 20px;
    margin-top: 50px;
}

/* ===========================
   WhatsApp Butonu
=========================== */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    transition: transform 0.3s, box-shadow 0.3s;
}

.whatsapp:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 12px rgba(0,0,0,0.4);
}

/* ===========================
   Mobil Uyumluluk
=========================== */
@media (max-width: 768px) {
    nav ul {
        flex-direction: column;
        gap: 10px;
        margin-top: 10px;
    }

    nav h2 {
        font-size: 22px;
        margin-bottom: 10px;
    }

    h1 {
        font-size: 28px;
    }

    .info {
        font-size: 14px;
    }

    .social h3 {
        font-size: 20px;
    }

    .social a {
        font-size: 16px;
        display: inline-block;
        margin: 5px 10px;
    }
}

@media (max-width: 480px) {
    h1 {
        font-size: 24px;
    }

    .info {
        font-size: 13px;
    }

    .social h3 {
        font-size: 18px;
    }

    .social a {
        font-size: 14px;
    }

    .map iframe {
        height: 200px;
    }
}
</style>
</head>
